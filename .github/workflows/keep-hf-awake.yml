name: Keep HF Space Awake

on:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

jobs:
  ping-space:
    runs-on: ubuntu-latest
    concurrency:
      group: keep-hf-awake-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Ping HF Space with retries
        shell: bash
        env:
          HF_SPACE_URL: https://emilyreed96989-iptv-spider.hf.space/
        run: |
          echo "Pinging ${HF_SPACE_URL}"
          curl --fail --silent --show-error \
            --location \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            --max-time 90 \
            "${HF_SPACE_URL}"
